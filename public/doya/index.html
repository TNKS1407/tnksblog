<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ドヤ文ジェネレータ — 完璧な文法・中身ゼロ・自信は満点</title>
<meta name="description" content="完璧な文法で、中身がまったく無い、自信満々の一文を吐く機械。ランキンが普段いちばん嫌う"それっぽい嘘"を、あえて機械にやらせて笑うための道具。">
<style>
  :root{
    --bg:#f4efe7; --card:#fffdf9; --ink:#20201c; --mut:#7d7568; --line:#e3dbd0;
    --teal:#3c7876; --gold:#b08908; --red:#c2543d;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Zen Kaku Gothic New",system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:radial-gradient(120% 120% at 50% -10%,#efe9df 0%,var(--bg) 60%);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 16px 40px;}
  .wrap{width:100%;max-width:640px;}
  h1{font-size:1.35rem;margin:.2rem 0 .15rem;letter-spacing:.01em;}
  .sub{font-size:.78rem;color:var(--mut);margin:0 0 1.3rem;line-height:1.6;}
  .genres{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
  .g{padding:.34rem .7rem;border:1px solid var(--line);border-radius:999px;background:var(--card);
    font-size:.74rem;color:var(--mut);cursor:pointer;transition:all .15s;font-family:inherit;}
  .g.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:1.6rem 1.5rem;box-shadow:0 6px 22px rgba(29,27,23,.07);position:relative;overflow:hidden;}
  .card::before{content:"“";position:absolute;top:-14px;left:10px;font-size:4rem;color:var(--line);font-family:Georgia,serif;}
  .quote{font-size:1.12rem;line-height:1.85;font-weight:500;min-height:5.2em;position:relative;z-index:1;
    display:flex;align-items:center;}
  .meta{display:flex;flex-wrap:wrap;gap:.5rem 1.1rem;margin-top:1.1rem;padding-top:.9rem;border-top:1px dashed var(--line);
    font-size:.72rem;color:var(--mut);font-family:"JetBrains Mono",ui-monospace,monospace;}
  .meta b{color:var(--teal);}
  .stars{color:var(--gold);letter-spacing:.1em;}
  .cite{font-style:italic;}
  .btns{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.2rem;}
  button.act{padding:.6rem 1.15rem;border-radius:10px;border:1px solid var(--line);background:var(--card);
    font-family:inherit;font-size:.86rem;color:var(--ink);cursor:pointer;transition:all .15s;font-weight:600;}
  button.act:hover{border-color:var(--teal);color:var(--teal);}
  button.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
  button.primary:hover{opacity:.9;color:#fff;}
  .review{margin-top:1rem;font-size:.82rem;line-height:1.7;color:var(--red);
    background:#fbf1ee;border:1px solid #f0d9d2;border-radius:10px;padding:.8rem 1rem;display:none;}
  .review.show{display:block;}
  .foot{margin-top:1.8rem;font-size:.68rem;color:var(--mut);line-height:1.8;border-top:1px solid var(--line);padding-top:1rem;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:.78rem;transition:all .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <h1>ドヤ文ジェネレータ</h1>
  <p class="sub">完璧な文法。中身はゼロ。でも自信だけは満点。<br>会議で言うと、なぜか場が納得した空気になる一文を吐く機械だよ。</p>

  <div class="genres" id="genres"></div>

  <div class="card">
    <div class="quote" id="quote">…</div>
    <div class="meta">
      <span>信頼度 <b id="conf">--</b></span>
      <span>それっぽさ <span class="stars" id="stars"></span></span>
      <span class="cite" id="cite"></span>
    </div>
  </div>

  <div class="btns">
    <button class="act primary" id="gen">もう一本 ▶</button>
    <button class="act" id="review">査読する 🔍</button>
    <button class="act" id="copy">コピー</button>
  </div>

  <div class="review" id="reviewBox"></div>

  <p class="foot">
    ※ このツールは、ランキンが普段いちばん嫌う「それっぽいのに中身の無い言い方」を、あえて機械にやらせて笑うためのもの。<br>
    出力の意味は保証しない ── むしろ<b>意味が無いことを保証する</b>。困ったときのハッタリにどうぞ（責任は取らない）。
  </p>
</div>
<div class="toast" id="toast">コピーした</div>

<script>
(function(){
  var SHARED={
    mod:["次世代の","非線形な","自己組織化する","動的に最適化された","分散協調型の","決定論的な","確率的な","高次の","疎な","エッジ駆動の","マルチモーダルな","ハイブリッドな","ゼロトラストな","スケーラブルな","量子論的な"],
    verb:["直交化","正則化","抽象化","カプセル化","非同期化","冗長化","蒸留","オーケストレーション","フェデレーション","疎行列化","パイプライン化","再定義","可視化"],
    metric:["スループット","レイテンシ","自由度","エントロピー","収束速度","ロバスト性","可観測性","保守性","帯域幅","再現性"],
    dir:["最大化","最小化","平滑化","底上げ","ドライブ","ブースト"],
    win:["シームレスな体験","持続可能な価値","エンドツーエンドの最適性","単一障害点の排除","本質的な抽象","圧倒的な差別化","破壊的なイノベーション","地に足のついた飛躍"]
  };
  var GENRE={
    all:{noun:["アーキテクチャ","パイプライン","トポロジ","潜在空間","特徴量","メタ構造","収束半径","エッジケース"]},
    rf:{noun:["インピーダンス整合","スペクトル包絡","位相境界","反射係数","群遅延","分布定数","スミス平面","雑音指数"]},
    ctrl:{noun:["制御ループ","状態空間","畳み込み核","伝達関数","極配置","サンプリング境界","フィードバック経路","位相余裕"]},
    data:{noun:["潜在空間","特徴量","埋め込み","注意機構","勾配流","損失地形","正則化項","事後分布"]},
    biz:{noun:["バリューチェーン","組織アジリティ","ステークホルダー","ロードマップ","シナジー","ケイパビリティ","パラダイム","KPIツリー"]}
  };
  var TPL=[
    function(n){return M('mod')+pick(n)+"を"+M('verb')+"することで、"+M('metric')+"を"+M('dir')+"し、"+M('win')+"を実現します。";},
    function(n){return "本手法は"+pick(n)+"と"+pick(n)+"を"+M('verb')+"し、"+M('mod')+pick(n)+"の上で"+M('metric')+"の"+M('dir')+"を保証します。";},
    function(n){return M('metric')+"の観点から"+pick(n)+"を再定義し、"+M('verb')+"を通じて"+M('win')+"へと接続します。";},
    function(n){return "まず"+pick(n)+"を"+M('verb')+"した上で、"+M('mod')+pick(n)+"に射影することで、"+M('metric')+"と"+M('metric')+"のトレードオフを解消します。";},
    function(n){return M('mod')+pick(n)+"は、"+pick(n)+"の"+M('metric')+"を"+M('dir')+"する一方、"+M('win')+"をもたらす点に本質があります。";},
    function(n){return "端的に言えば、"+pick(n)+"を"+M('verb')+"し、"+M('mod')+pick(n)+"として捉え直すことが、"+M('win')+"への最短経路です。";}
  ];
  function rnd(a){return a[Math.floor(Math.random()*a.length)];}
  function pick(n){return rnd(n);}
  function M(k){return rnd(SHARED[k]);}

  var authors=["田中ら","佐藤・鈴木","高橋","中村ほか","当社R&D","匿名の有識者","ワーキンググループ"];
  var years=["2024","2025","2026","近日","私見"];
  var genre="all";
  var q=document.getElementById('quote'), conf=document.getElementById('conf'),
      stars=document.getElementById('stars'), cite=document.getElementById('cite'),
      reviewBox=document.getElementById('reviewBox');

  function generate(){
    var n=GENRE[genre].noun.concat(GENRE.all.noun);
    var s=rnd(TPL)(n);
    q.textContent=s;
    conf.textContent=(94+Math.random()*5.9).toFixed(1)+"%";
    var st=4+(Math.random()<0.5?1:0);
    stars.textContent="★★★★★".slice(0,st)+"☆☆☆☆☆".slice(0,5-st);
    cite.textContent="[出典: "+rnd(authors)+", "+rnd(years)+", 未査読]";
    reviewBox.classList.remove('show');
    return s;
  }

  // genre chips
  var G=[["all","全部"],["rf","RF・回路"],["ctrl","制御・信号"],["data","データ・AI"],["biz","経営・意識高い"]];
  var gc=document.getElementById('genres');
  G.forEach(function(pair){
    var b=document.createElement('button'); b.className='g'+(pair[0]==='all'?' on':''); b.textContent=pair[1];
    b.onclick=function(){ genre=pair[0]; [].forEach.call(gc.children,function(c){c.classList.remove('on');}); b.classList.add('on'); generate(); };
    gc.appendChild(b);
  });

  document.getElementById('gen').onclick=generate;
  document.getElementById('review').onclick=function(){
    var msgs=[
      "査読の結果：文法は完璧、主張は自明でも反証可能でもなく、中身は 0 件でした（想定どおり）。",
      "査読コメント：「で、それ何がうれしいの？」に一行も答えていません。だが自信は満点。",
      "再現性チェック：誰がやっても同じく何も起きないことを確認。よって再現性 100%。",
      "本質を1行に：『たぶん、特に何も言っていない』。ここは誤魔化さないでおこう。"
    ];
    reviewBox.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    reviewBox.classList.add('show');
  };
  var toast=document.getElementById('toast');
  document.getElementById('copy').onclick=function(){
    var t=q.textContent;
    (navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(t):Promise.reject())
      .then(show).catch(function(){ var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);show(); });
    function show(){ toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1200); }
  };

  generate();
})();
</script>
</body>
</html>
