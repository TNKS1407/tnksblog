<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320" font-family="'Segoe UI','Hiragino Kaku Gothic ProN',system-ui,sans-serif">
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9a9384"/></marker>
    <marker id="at" markerWidth="10" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#3c7876"/></marker>
  </defs>
  <rect width="560" height="320" fill="#faf8f4"/>
  <text x="22" y="30" font-size="15" fill="#2b2b29">DFT の k 番目 ＝ 各サンプルを少しずつ回して、足し合わせる</text>

  <!-- chained sample phasors (tip to tail) -->
  <line x1="140" y1="248" x2="184" y2="248" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="184" y1="248" x2="222.1" y2="226" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="222.1" y1="226" x2="244.1" y2="187.9" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="244.1" y1="187.9" x2="244.1" y2="143.9" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="244.1" y1="143.9" x2="222.1" y2="105.8" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>
  <line x1="222.1" y1="105.8" x2="184" y2="83.8" stroke="#9a9384" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- sample labels -->
  <text x="150" y="266" font-size="12" fill="#6b6b66">x[0]</text>
  <text x="208" y="250" font-size="12" fill="#6b6b66">x[1]</text>
  <text x="252" y="206" font-size="12" fill="#6b6b66">x[2]</text>
  <text x="200" y="100" font-size="13" fill="#6b6b66">…</text>

  <!-- resultant -->
  <line x1="140" y1="248" x2="184" y2="83.8" stroke="#3c7876" stroke-width="3" marker-end="url(#at)"/>
  <text x="92" y="160" font-size="14" fill="#2f6260" font-weight="bold">X[k]</text>
  <circle cx="140" cy="248" r="3.5" fill="#2b2b29"/>

  <!-- side notes -->
  <text x="372" y="118" font-size="12.5" fill="#6b6b66">・各 x[n] を −2πk/N ずつ回す</text>
  <text x="372" y="142" font-size="12.5" fill="#6b6b66">・全部つなげて（足して）いく</text>
  <text x="372" y="166" font-size="12.5" fill="#6b6b66">・最後の合計ベクトルが X[k]</text>

  <!-- caption -->
  <text x="22" y="302" font-size="12.5" fill="#9a9384">向きがそろうほど合計は長くなる＝その周波数の成分が強い、ということ。</text>
</svg>
