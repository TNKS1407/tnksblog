<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340" font-family="'Segoe UI','Hiragino Kaku Gothic ProN',system-ui,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b6b66"/></marker>
    <marker id="ars" markerWidth="9" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e0892f"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="340" fill="#faf8f4"/>
  <!-- axes -->
  <line x1="58" y1="40" x2="58" y2="288" stroke="#cfc7b6" stroke-width="1.4"/>
  <line x1="58" y1="288" x2="540" y2="288" stroke="#cfc7b6" stroke-width="1.4"/>
  <text x="14" y="60" font-size="12" fill="#9a9384">パワー</text>
  <text x="14" y="74" font-size="12" fill="#9a9384">[dBc]</text>
  <text x="470" y="308" font-size="12" fill="#9a9384">オフセット周波数</text>
  <!-- 0 dBc reference -->
  <line x1="58" y1="70" x2="540" y2="70" stroke="#d9d2c4" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="62" y="66" font-size="11" fill="#b0a99a">0 dBc（キャリア基準）</text>

  <!-- noise skirt (both sides), filled -->
  <path d="M58,250 C120,235 150,120 170,72 C190,120 360,210 540,250 L540,288 L58,288 Z" fill="rgba(60,120,118,0.16)"/>
  <path d="M58,250 C120,235 150,120 170,72 C190,120 360,210 540,250" fill="none" stroke="#3c7876" stroke-width="2"/>

  <!-- carrier spike -->
  <line x1="170" y1="288" x2="170" y2="50" stroke="#2b2b29" stroke-width="3"/>
  <circle cx="170" cy="50" r="3" fill="#2b2b29"/>
  <text x="170" y="304" font-size="12" text-anchor="middle" fill="#2b2b29">f₀（キャリア）</text>

  <!-- offset marker at f -->
  <line x1="360" y1="288" x2="360" y2="206" stroke="#e0892f" stroke-width="1.6" stroke-dasharray="5 4"/>
  <circle cx="360" cy="206" r="4" fill="#e0892f"/>
  <text x="360" y="304" font-size="12" text-anchor="middle" fill="#c9761f">オフセット f</text>
  <!-- 1 Hz width bracket at the marker -->
  <line x1="353" y1="200" x2="367" y2="200" stroke="#c9761f" stroke-width="1.4"/>
  <line x1="353" y1="196" x2="353" y2="204" stroke="#c9761f" stroke-width="1.4"/>
  <line x1="367" y1="196" x2="367" y2="204" stroke="#c9761f" stroke-width="1.4"/>
  <text x="372" y="194" font-size="11" fill="#c9761f">1 Hz 幅</text>
  <!-- horizontal to axis: L(f) level -->
  <line x1="360" y1="206" x2="58" y2="206" stroke="#e0892f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="62" y="222" font-size="12" fill="#c9761f">ℒ(f) ≈ −120 dBc/Hz</text>

  <!-- dB gap arrow (carrier 0dBc → skirt level) -->
  <line x1="430" y1="72" x2="430" y2="204" stroke="#6b6b66" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="438" y="142" font-size="12" fill="#6b6b66">キャリアより</text>
  <text x="438" y="158" font-size="12" fill="#6b6b66">120 dB 下</text>

  <!-- caption -->
  <text x="280" y="330" font-size="12.5" text-anchor="middle" fill="#3c7876">ℒ(f) = オフセット f で 1 Hz 幅を切り取った雑音が、キャリアより何 dB 下か</text>
</svg>
